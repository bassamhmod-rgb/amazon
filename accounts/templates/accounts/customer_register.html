<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل زبون جديد</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Cairo", sans-serif;
            background:#f5f7fa;
            padding:40px;
        }

        .card {
            max-width:420px;
            margin:auto;
            border-radius:14px;
            padding:25px;
            box-shadow:0 6px 16px rgba(0,0,0,0.08);
        }

        .btn-primary {
            background:#1A2A4A;
            border:none;
            padding:10px;
            font-weight:700;
        }

        .btn-primary:hover {
            background:#162033;
        }
    </style>
</head>

<body>

    <div class="card">

        <h3 class="text-center mb-3">📝 إنشاء حساب زبون</h3>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-warning">{{ message }}</div>
                {% if forloop.first %}{% endif %}
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <label>اسم الزبون</label>
            <input type="text" name="name" class="form-control mb-3" required>

            <label>رقم الهاتف</label>
            <input type="text" name="phone" class="form-control mb-3" required>

            <button class="btn btn-primary w-100">إنشاء الحساب</button>
        </form>

        <p class="text-center mt-3">
            لديك حساب؟  
            <a href="{% url 'accounts:customer_login' %}">سجّل دخولك</a>

        </p>

    </div>

</body>
</html>
